<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクアタッチ 館内ガイド デモ｜水族館タッチサイネージ</title>
<style>
  :root{
    --bg:#04121f; --bg2:#0a2540; --panel:#0e2c4d; --panel2:#123a63;
    --cyan:#22d3ee; --cyan-d:#0891b2; --gold:#fbbf24; --green:#34d399; --red:#f87171;
    --text:#eaf6ff; --muted:#9fc0d8;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg); color:var(--text); width:100vw; height:100vh; overflow:hidden;
  }
  #app{width:100%; height:100%; position:relative;}
  .screen{position:absolute; inset:0; display:none; flex-direction:column;}
  .screen.active{display:flex;}
  button{font-family:inherit; cursor:pointer;}

  /* ---- Idle ---- */
  #screen-idle{
    background:radial-gradient(circle at 50% 30%,#0a2540,var(--bg));
    align-items:center; justify-content:center; text-align:center; cursor:pointer; overflow:hidden;
  }
  .bubbles span{position:absolute; bottom:-40px; border-radius:50%; background:rgba(34,211,238,.15);
    animation:rise linear infinite;}
  @keyframes rise{to{transform:translateY(-110vh);}}
  #screen-idle .fish{font-size:4.5rem; letter-spacing:.4em; margin-bottom:8px; animation:sway 3s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:translateX(-14px);}50%{transform:translateX(14px);}}
  #screen-idle h1{font-size:3rem; margin-bottom:12px; text-shadow:0 2px 20px rgba(34,211,238,.4);}
  #screen-idle .sub{font-size:1.3rem; color:var(--muted); margin-bottom:38px;}
  #screen-idle .tap{font-size:1.6rem; padding:18px 52px; border-radius:60px; background:var(--cyan-d); color:#fff;
    animation:pulse 1.6s infinite; z-index:2;}
  @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}

  /* ---- Header ---- */
  header{background:linear-gradient(90deg,var(--bg2),var(--panel)); padding:14px 26px;
    display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid rgba(34,211,238,.25);}
  header .home-btn{display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.08); border:none; color:var(--text);
    padding:10px 18px; border-radius:40px; font-size:1rem;}
  header .brand{font-size:1.15rem; font-weight:bold; letter-spacing:.03em;}
  .lang-toggle{display:flex; gap:6px;}
  .lang-toggle button{padding:7px 16px; border-radius:20px; border:2px solid rgba(255,255,255,.25); background:none; color:var(--text); font-size:.9rem;}
  .lang-toggle button.active{background:var(--cyan-d); border-color:var(--cyan-d); font-weight:bold;}
  main{flex:1; overflow:auto; padding:26px 32px;}

  /* ---- Home ---- */
  .home-hero{text-align:center; margin-bottom:26px;}
  .home-hero h2{font-size:1.7rem; margin-bottom:6px;}
  .home-hero p{color:var(--muted);}
  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:20px; max-width:1100px; margin:0 auto;}
  .tile{background:linear-gradient(160deg,var(--panel),var(--panel2)); border:2px solid rgba(34,211,238,.2);
    border-radius:22px; padding:34px 18px; text-align:center; color:var(--text); transition:transform .15s, border-color .15s;}
  .tile:active{transform:scale(.97);} .tile:hover{border-color:var(--cyan);}
  .tile .ic{font-size:3.4rem; margin-bottom:12px;}
  .tile h3{font-size:1.25rem; margin-bottom:4px;}
  .tile small{color:var(--muted);}

  .page-title{font-size:1.5rem; font-weight:bold; margin-bottom:18px; display:flex; align-items:center; gap:10px;}
  .page-title .badge{font-size:.8rem; background:var(--cyan-d); padding:4px 12px; border-radius:20px;}

  /* ---- Map ---- */
  .zone-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px;}
  .zone-card{border-radius:18px; padding:24px; color:#062033; font-weight:bold; text-align:left; border:none; position:relative; overflow:hidden; min-height:150px;}
  .zone-card .zic{font-size:2.8rem;}
  .zone-card h3{font-size:1.3rem; margin:8px 0 4px; color:#04121f;}
  .zone-card .cnt{font-size:.9rem; color:#0a3350; opacity:.85;}
  .zone-card .go{position:absolute; right:16px; bottom:14px; font-size:1.4rem; color:#04121f;}

  /* ---- Creature list ---- */
  .filter-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .chip{padding:9px 18px; border-radius:30px; border:2px solid rgba(34,211,238,.3); background:none; color:var(--text); font-size:.95rem;}
  .chip.active{background:var(--cyan); color:#04121f; border-color:var(--cyan); font-weight:bold;}
  .creature-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px;}
  .creature-card{background:var(--panel); border:2px solid transparent; border-radius:16px; padding:18px; text-align:center; color:var(--text);}
  .creature-card:hover{border-color:var(--cyan);}
  .creature-card .cimg{font-size:3.4rem; margin-bottom:8px;}
  .creature-card h4{font-size:1.05rem;}
  .creature-card .tank{font-size:.78rem; color:var(--muted); margin-top:4px;}

  /* ---- Creature detail ---- */
  .detail-wrap{display:grid; grid-template-columns:1fr 1.2fr; gap:26px;}
  .detail-media .photo{background:linear-gradient(160deg,#0a2540,#123a63); border-radius:18px; height:260px;
    display:flex; align-items:center; justify-content:center; font-size:8rem; border:2px solid rgba(34,211,238,.2);}
  .video-box{margin-top:16px; background:#00121f; border:2px solid rgba(34,211,238,.3); border-radius:14px; height:150px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:8px;}
  .video-box .play{width:56px; height:56px; border-radius:50%; background:var(--cyan); color:#04121f; display:flex; align-items:center; justify-content:center; font-size:1.6rem;}
  .detail-info .tagz{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .detail-info .tagz span{background:var(--panel2); padding:5px 14px; border-radius:20px; font-size:.85rem;}
  .detail-info h2{font-size:2rem; margin-bottom:6px;}
  .detail-info .en{color:var(--muted); font-style:italic; margin-bottom:16px;}
  .detail-info p{font-size:1.05rem; line-height:1.9; color:#dbeeff; margin-bottom:14px;}
  .fact{background:rgba(34,211,238,.1); border-left:5px solid var(--cyan); padding:12px 16px; border-radius:10px; margin-bottom:10px; font-size:.98rem;}

  /* ---- Events ---- */
  .event-list{display:flex; flex-direction:column; gap:14px; max-width:820px;}
  .event-card{display:flex; align-items:center; gap:20px; background:var(--panel); border-radius:16px; padding:18px 22px; color:var(--text); text-align:left; border:2px solid transparent;}
  .event-card:hover{border-color:var(--cyan);}
  .event-card .time{font-size:1.5rem; font-weight:bold; color:var(--cyan); min-width:120px;}
  .event-card .ev-body h4{font-size:1.15rem; margin-bottom:2px;}
  .event-card .ev-body small{color:var(--muted);}
  .event-card.soon{border-color:var(--gold); box-shadow:0 0 18px rgba(251,191,36,.25);}
  .event-card .soon-tag{margin-left:auto; background:var(--gold); color:#3a2a00; padding:5px 12px; border-radius:20px; font-size:.8rem; font-weight:bold;}

  /* ---- Quiz ---- */
  .quiz-wrap{max-width:760px; margin:0 auto; text-align:center;}
  .quiz-progress{color:var(--muted); margin-bottom:14px;}
  .quiz-q{background:var(--panel); border-radius:18px; padding:28px; margin-bottom:20px;}
  .quiz-q .qic{font-size:3.4rem; margin-bottom:10px;}
  .quiz-q h3{font-size:1.4rem; line-height:1.6;}
  .quiz-opts{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .opt{padding:20px; border-radius:14px; border:3px solid rgba(34,211,238,.3); background:var(--panel); color:var(--text); font-size:1.15rem;}
  .opt.correct{background:var(--green); color:#04321f; border-color:var(--green);}
  .opt.wrong{background:var(--red); color:#3a0000; border-color:var(--red);}
  .opt:disabled{opacity:.9;}
  .quiz-feedback{font-size:1.2rem; margin-top:16px; min-height:30px; font-weight:bold;}
  .quiz-result{text-align:center;}
  .quiz-result .score{font-size:3.6rem; font-weight:bold; color:var(--gold); margin:10px 0;}
  .next-btn{margin-top:6px; padding:14px 40px; border-radius:40px; border:none; background:var(--cyan-d); color:#fff; font-size:1.1rem; font-weight:bold;}

  .back-inline{margin-top:22px; padding:12px 28px; border-radius:40px; border:2px solid rgba(255,255,255,.3); background:none; color:var(--text); font-weight:bold;}
</style>
</head>
<body>
<div id="app">

  <!-- IDLE -->
  <div id="screen-idle" class="screen active">
    <div class="bubbles" id="bubbles"></div>
    <div class="fish">🐟 🐬 🐧 🪼</div>
    <h1 id="idleTitle">アクアタッチ 館内ガイド</h1>
    <div class="sub" id="idleSub">マップ・イベント・生き物図鑑・クイズ</div>
    <div class="tap" id="idleTap">タッチしてはじめる ▶</div>
  </div>

  <!-- HOME -->
  <div id="screen-home" class="screen">
    <header>
      <div class="brand" id="brandHome">🐟 アクアタッチ 館内ガイド</div>
      <div class="lang-toggle">
        <button id="ja1" class="active" onclick="setLang('ja')">日本語</button>
        <button id="en1" onclick="setLang('en')">English</button>
      </div>
    </header>
    <main>
      <div class="home-hero"><h2 id="homeH">ようこそ！</h2><p id="homeP">見たい項目をタッチしてください</p></div>
      <div class="tiles">
        <button class="tile" onclick="openMap()"><div class="ic">🗺️</div><h3 id="t1">フロアマップ</h3><small id="t1s">ゾーンから探す</small></button>

        <button class="tile" onclick="openCreatures('all')"><div class="ic">🐠</div><h3 id="t3">生き物図鑑</h3><small id="t3s">写真・動画で見る</small></button>
        <button class="tile" onclick="startQuiz()"><div class="ic">❓</div><h3 id="t4">クイズ</h3><small id="t4s">遊んで学ぶ</small></button>
      </div>
    </main>
  </div>

  <!-- MAP -->
  <div id="screen-map" class="screen">
    <header>
      <button class="home-btn" onclick="goto('screen-home')">🏠 <span id="homeBtn1">ホーム</span></button>
      <div class="brand" id="mapTitleH">フロアマップ</div>
      <div class="lang-toggle"><button class="active" onclick="setLang('ja')" id="ja2">日本語</button><button onclick="setLang('en')" id="en2">English</button></div>
    </header>
    <main>
      <div class="page-title" id="mapPT">🗺️ ゾーンを選んでください</div>
      <div class="zone-grid" id="zoneGrid"></div>
    </main>
  </div>

  <!-- CREATURE LIST -->
  <div id="screen-creatures" class="screen">
    <header>
      <button class="home-btn" onclick="goto('screen-home')">🏠 <span>ホーム</span></button>
      <div class="brand" id="clTitleH">生き物図鑑</div>
      <div class="lang-toggle"><button class="active" onclick="setLang('ja')">日本語</button><button onclick="setLang('en')">English</button></div>
    </header>
    <main>
      <div class="filter-row" id="filterRow"></div>
      <div class="creature-grid" id="creatureGrid"></div>
    </main>
  </div>

  <!-- CREATURE DETAIL -->
  <div id="screen-detail" class="screen">
    <header>
      <button class="home-btn" onclick="goto('screen-creatures')">◀ <span id="backList">一覧へ</span></button>
      <div class="brand" id="dTitleH">生き物図鑑</div>
      <div class="lang-toggle"><button class="active" onclick="setLang('ja')">日本語</button><button onclick="setLang('en')">English</button></div>
    </header>
    <main>
      <div class="detail-wrap">
        <div class="detail-media">
          <div class="photo" id="dPhoto">🐧</div>
          <div class="video-box"><div class="play">▶</div><div id="dVideo">解説動画を再生</div></div>
        </div>
        <div class="detail-info">
          <div class="tagz" id="dTags"></div>
          <h2 id="dName">-</h2>
          <div class="en" id="dEn">-</div>
          <p id="dDesc">-</p>
          <div class="fact" id="dFact"></div>
          <button class="next-btn" onclick="startQuiz()" id="dQuizBtn">❓ この子のクイズに挑戦</button>
        </div>
      </div>
    </main>
  </div>

  <!-- EVENTS -->
  <div id="screen-events" class="screen">
    <header>
      <button class="home-btn" onclick="goto('screen-home')">🏠 <span>ホーム</span></button>
      <div class="brand" id="evTitleH">本日のイベント</div>
      <div class="lang-toggle"><button class="active" onclick="setLang('ja')">日本語</button><button onclick="setLang('en')">English</button></div>
    </header>
    <main>
      <div class="page-title" id="evPT">📅 本日のショー・イベントスケジュール</div>
      <div class="event-list" id="eventList"></div>
    </main>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <header>
      <button class="home-btn" onclick="goto('screen-home')">🏠 <span>ホーム</span></button>
      <div class="brand" id="qzTitleH">生き物クイズ</div>
      <div class="lang-toggle"><button class="active" onclick="setLang('ja')">日本語</button><button onclick="setLang('en')">English</button></div>
    </header>
    <main>
      <div class="quiz-wrap" id="quizArea"></div>
    </main>
  </div>

</div>

<script>
/* ============ DATA ============
   運用時はこのデータをGoogleスプレッドシート/エクセルから差し替え可能な想定
   （案3と同じ「担当者がシート更新→自動反映」方式に拡張できます）        */
const ZONES = [
  {id:"penguin", color:"#a5d8ff", ic:"🐧", ja:"ペンギンゾーン", en:"Penguin Zone"},
  {id:"dolphin", color:"#99e9f2", ic:"🐬", ja:"イルカゾーン", en:"Dolphin Zone"},
  {id:"deep",    color:"#748ffc", ic:"🦈", ja:"深海ゾーン",    en:"Deep Sea Zone"},
  {id:"jelly",   color:"#eebefa", ic:"🪼", ja:"クラゲ回廊",      en:"Jellyfish Gallery"},
  {id:"touch",   color:"#b2f2bb", ic:"🐢", ja:"ふれあいゾーン", en:"Touch Pool Zone"},
];
const CREATURES = [
  {zone:"penguin", img:"🐧", tank:"01", ja:{name:"フンボルトペンギン", en:"Humboldt Penguin",
     desc:"南米の海岸に暮らすペンギン。水中を時速30kmで泳ぎ、翼を上手に使って魚をつかまえます。",
     fact:"実は暑さに強く、日本の気候でも元気に暮らせます。"},
   en:{name:"Humboldt Penguin", sci:"Spheniscus humboldti",
     desc:"A penguin from the South American coast. It swims up to 30 km/h, using its wings to catch fish.",

  {zone:"dolphin", img:"🐬", tank:"02", ja:{name:"バンドウイルカ", en:"Bottlenose Dolphin",

   en:{name:"Bottlenose Dolphin", sci:"Tursiops truncatus",

  {zone:"deep", img:"🦈", tank:"03", ja:{name:"シロワニ", en:"Sand Tiger Shark",

   en:{name:"Sand Tiger Shark", sci:"Carcharias taurus",

  {zone:"deep", img:"🐡", tank:"04", ja:{name:"ハリセンボン", en:"Porcupinefish",

   en:{name:"Porcupinefish", sci:"Diodon holocanthus",
     desc:"When startled, it puffs up and raises its spines to protect itself.",
     fact:"Its name means 'thousand needles' but it actually has about 350."}},
  {zone:"jelly", img:"🪼", tank:"05", ja:{name:"ミズクラゲ", en:"Moon Jelly",
     desc:"体の95%が水でできた、ふわふわ漂うクラゲ。ライトに照らされ幻想的に光ります。",

   en:{name:"Moon Jelly", sci:"Aurelia aurita",
     desc:"A drifting jelly that is 95% water, glowing beautifully under the lights.",
     fact:"It has no brain or heart, yet swims and lives just fine."}},
  {zone:"touch", img:"🐢", tank:"06", ja:{name:"アオウミガメ", en:"Green Sea Turtle",

  {zone:"touch", img:"🦀", tank:"07", ja:{name:"タカアシガニ", en:"Japanese Spider Crab",

   en:{name:"Japanese Spider Crab", sci:"Macrocheira kaempferi",

  {zone:"penguin", img:"🦭", tank:"08", ja:{name:"ゴマフアザラシ", en:"Spotted Seal",

const EVENTS = [
  {time:"10:30", ja:{title:"イルカパフォーマンス", place:"メインプール", len:"約20分"}, en:{title:"Dolphin Performance", place:"Main Pool", len:"~20 min"}},
  {time:"11:15", ja:{title:"ペンギンのお食事タイム", place:"ペンギンゾーン", len:"約15分"}, en:{title:"Penguin Feeding Time", place:"Penguin Zone", len:"~15 min"}},

  {time:"14:30", ja:{title:"イルカパフォーマンス", place:"メインプール", len:"約20分"}, en:{title:"Dolphin Performance", place:"Main Pool", len:"~20 min"}},

const QUIZ = [
  {ic:"🐧", ja:{q:"ペンギンは空を飛べる？", a:["飛べる","飛べない"], correct:1, exp:"翼は泳ぐために進化しました。だから水の中を『飛ぶ』ように泳ぎます！"},

  {ic:"🦀", ja:{q:"タカアシガニのあしを広げるとどれくらい？", a:["約1m","3m以上"], correct:1, exp:"3mを超えることも！世界最大級のカニです。"},
       en:{q:"How wide can a spider crab's legs spread?", a:["~1m","Over 3m"], correct:1, exp:"Over 3m — one of the world's largest crabs!"}},
];

/* ============ STATE / I18N ============ */
let lang="ja", curFilter="all", quizIdx=0, quizScore=0;
const UI={
  ja:{idleTitle:"アクアタッチ 館内ガイド", idleSub:"マップ・イベント・生き物図鑑・クイズ", idleTap:"タッチしてはじめる ▶",
    brand:"🐟 アクアタッチ 館内ガイド", homeH:"ようこそ！", homeP:"見たい項目をタッチしてください",
    t1:"フロアマップ",t1s:"ゾーンから探す",t2:"イベント",t2s:"本日のショー",t3:"生き物図鑑",t3s:"写真・動画で見る",t4:"クイズ",t4s:"遊んで学ぶ",
    mapTitle:"フロアマップ", mapPT:"🗺️ ゾーンを選んでください", clTitle:"生き物図鑑",
    evTitle:"本日のイベント", evPT:"📅 本日のショー・イベントスケジュール", qzTitle:"生き物クイズ",
    home:"ホーム", backList:"一覧へ", all:"すべて", video:"解説動画を再生", quizBtn:"❓ クイズに挑戦",
    tankLabel:"水槽", zoneLabel:"ゾーン", soon:"まもなく", result:"クイズ結果", correct:"せいかい！", wrong:"ざんねん…",
    scoreOf:(s,t)=>`${t}問中 ${s}問 せいかい！`, retry:"もう一度あそぶ", toHome:"ホームへもどる", next:"次へ ▶"},
  en:{idleTitle:"AquaTouch Guide", idleSub:"Map · Events · Creatures · Quiz", idleTap:"Touch to Start ▶",
    brand:"🐟 AquaTouch Guide", homeH:"Welcome!", homeP:"Touch what you'd like to see",
    t1:"Floor Map",t1s:"Find by zone",t2:"Events",t2s:"Today's shows",t3:"Creatures",t3s:"Photos & video",t4:"Quiz",t4s:"Play & learn",
    mapTitle:"Floor Map", mapPT:"🗺️ Choose a zone", clTitle:"Creatures",
    evTitle:"Today's Events", evPT:"📅 Today's shows & events", qzTitle:"Creature Quiz",
    home:"Home", backList:"List", all:"All", video:"Play video", quizBtn:"❓ Take the quiz",
    tankLabel:"Tank", zoneLabel:"Zone", soon:"Soon", result:"Result", correct:"Correct!", wrong:"Oops…",
    scoreOf:(s,t)=>`You got ${s} of ${t}!`, retry:"Play again", toHome:"Back to Home", next:"Next ▶"}
};
const t=()=>UI[lang];

function goto(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

/* idle */
(function(){const b=document.getElementById('bubbles');let h="";for(let i=0;i<14;i++){const sz=10+Math.floor((i*37)%40);const left=(i*67)%100;const dur=6+((i*13)%9);const del=(i*7)%9;h+=`<span style="width:${sz}px;height:${sz}px;left:${left}%;animation-duration:${dur}s;animation-delay:-${del}s"></span>`;}b.innerHTML=h;})();
document.getElementById('screen-idle').addEventListener('click',()=>goto('screen-home'));

/* MAP */
function renderZones(){document.getElementById('zoneGrid').innerHTML=ZONES.map(z=>{
  const n=CREATURES.filter(c=>c.zone===z.id).length;
  return `<button class="zone-card" style="background:${z.color}" onclick="openCreatures('${z.id}')">
    <div class="zic">${z.ic}</div><h3>${z[lang]}</h3><div class="cnt">${n} ${lang==='ja'?'種展示':'species'}</div><div class="go">▶</div></button>`;
}).join("");}
function openMap(){renderZones();goto('screen-map');}

/* CREATURES */
function renderFilter(){
  const chips=[{id:"all",label:t().all}].concat(ZONES.map(z=>({id:z.id,label:z[lang]})));
  document.getElementById('filterRow').innerHTML=chips.map(c=>`<button class="chip ${c.id===curFilter?'active':''}" onclick="openCreatures('${c.id}')">${c.id==='all'?'🐠 ':''}${c.label}</button>`).join("");
}
function renderCreatures(){
  const list=curFilter==='all'?CREATURES:CREATURES.filter(c=>c.zone===curFilter);
  document.getElementById('creatureGrid').innerHTML=list.map(c=>{
    const idx=CREATURES.indexOf(c);
    return `<button class="creature-card" onclick="openDetail(${idx})"><div class="cimg">${c.img}</div><h4>${c.ja.name&&lang==='ja'?c.ja.name:c.en.name}</h4><div class="tank">${t().tankLabel} ${c.tank}</div></button>`;
  }).join("");
}
function openCreatures(zone){curFilter=zone;renderFilter();renderCreatures();goto('screen-creatures');}
function openDetail(i){
  const c=CREATURES[i];const d=lang==='ja'?c.ja:c.en;const zone=ZONES.find(z=>z.id===c.zone);
  document.getElementById('dPhoto').textContent=c.img;
  document.getElementById('dName').textContent=d.name;
  document.getElementById('dEn').textContent=lang==='ja'?c.en.name:c.en.sci;
  document.getElementById('dDesc').textContent=d.desc;
  document.getElementById('dFact').textContent="💡 "+d.fact;
  document.getElementById('dVideo').textContent=t().video;
  document.getElementById('dTags').innerHTML=`<span>${zone.ic} ${zone[lang]}</span><span>${t().tankLabel} ${c.tank}</span>`;
  document.getElementById('dQuizBtn').textContent=t().quizBtn;
  goto('screen-detail');
}

/* EVENTS */
function renderEvents(){
  const now=new Date();const cur=now.getHours()*60+now.getMinutes();
  let nextMarked=false;
  document.getElementById('eventList').innerHTML=EVENTS.map(e=>{
    const d=lang==='ja'?e.ja:e.en;const[h,m]=e.time.split(':').map(Number);const emin=h*60+m;
    const isNext=!nextMarked&&emin>=cur;if(isNext)nextMarked=true;
    return `<button class="event-card ${isNext?'soon':''}"><div class="time">${e.time}</div>
      <div class="ev-body"><h4>${d.title}</h4><small>📍 ${d.place} ・ ${d.len}</small></div>
      ${isNext?`<span class="soon-tag">${t().soon}</span>`:''}</button>`;
  }).join("");
}
function openEvents(){renderEvents();goto('screen-events');}

/* QUIZ */
function startQuiz(){quizIdx=0;quizScore=0;renderQuiz();goto('screen-quiz');}
function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(quizIdx>=QUIZ.length){
    area.innerHTML=`<div class="quiz-result"><div class="qic" style="font-size:4rem">🎉</div>
      <h2>${t().result}</h2><div class="score">${quizScore} / ${QUIZ.length}</div>
      <p>${t().scoreOf(quizScore,QUIZ.length)}</p>
      <div style="margin-top:22px"><button class="next-btn" onclick="startQuiz()">🔁 ${t().retry}</button>
      <button class="back-inline" onclick="goto('screen-home')">${t().toHome}</button></div></div>`;
    return;
  }
  const q=QUIZ[quizIdx];const d=lang==='ja'?q.ja:q.en;
  area.innerHTML=`<div class="quiz-progress">${quizIdx+1} / ${QUIZ.length}</div>
    <div class="quiz-q"><div class="qic">${q.ic}</div><h3>${d.q}</h3></div>
    <div class="quiz-opts">${d.a.map((op,i)=>`<button class="opt" onclick="answer(${i})">${op}</button>`).join("")}</div>
    <div class="quiz-feedback" id="qfb"></div>`;
}
function answer(i){
  const q=QUIZ[quizIdx];const d=lang==='ja'?q.ja:q.en;
  const opts=document.querySelectorAll('.opt');opts.forEach(o=>o.disabled=true);
  const fb=document.getElementById('qfb');
  if(i===d.correct){opts[i].classList.add('correct');quizScore++;fb.style.color='var(--green)';fb.textContent="⭕ "+t().correct+" "+d.exp;}
  else{opts[i].classList.add('wrong');opts[d.correct].classList.add('correct');fb.style.color='var(--red)';fb.textContent="❌ "+t().wrong+" "+d.exp;}
  const nb=document.createElement('button');nb.className='next-btn';nb.style.marginTop='16px';nb.textContent=t().next;
  nb.onclick=()=>{quizIdx++;renderQuiz();};fb.after(nb);
}

/* LANG */
function setLang(l){
  lang=l;const u=t();
  document.getElementById('idleTitle').textContent=u.idleTitle;
  document.getElementById('idleSub').textContent=u.idleSub;
  document.getElementById('idleTap').textContent=u.idleTap;
  ['brandHome'].forEach(id=>document.getElementById(id).textContent=u.brand);
  document.getElementById('homeH').textContent=u.homeH;document.getElementById('homeP').textContent=u.homeP;
  document.getElementById('t1').textContent=u.t1;document.getElementById('t1s').textContent=u.t1s;
  document.getElementById('t2').textContent=u.t2;document.getElementById('t2s').textContent=u.t2s;
  document.getElementById('t3').textContent=u.t3;document.getElementById('t3s').textContent=u.t3s;
  document.getElementById('t4').textContent=u.t4;document.getElementById('t4s').textContent=u.t4s;
  document.getElementById('mapTitleH').textContent=u.mapTitle;document.getElementById('mapPT').textContent=u.mapPT;
  document.getElementById('clTitleH').textContent=u.clTitle;document.getElementById('dTitleH').textContent=u.clTitle;
  document.getElementById('evTitleH').textContent=u.evTitle;document.getElementById('evPT').textContent=u.evPT;
  document.getElementById('qzTitleH').textContent=u.qzTitle;
  document.getElementById('homeBtn1').textContent=u.home;document.getElementById('backList').textContent=u.backList;
  document.querySelectorAll('.lang-toggle').forEach(tg=>{const bs=tg.querySelectorAll('button');bs[0].classList.toggle('active',l==='ja');bs[1].classList.toggle('active',l==='en');});
  // re-render active dynamic screens
  renderZones();renderFilter();renderCreatures();renderEvents();
  if(document.getElementById('screen-quiz').classList.contains('active'))renderQuiz();
}

renderZones();renderFilter();renderCreatures();renderEvents();

/* Hash routing: 設置場所ごとに開始画面を指定できる (#home/#map/#events/#creatures/#quiz) */
function route(){
  const h=(location.hash||'').replace('#','');
  if(h==='map')openMap(); else if(h==='events')openEvents(); else if(h==='creatures')openCreatures('all');
  else if(h==='quiz')startQuiz(); else if(h==='home')goto('screen-home');
}
window.addEventListener('hashchange',route); route();
</script>
</body>
</html>
